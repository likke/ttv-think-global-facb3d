<style>
 :root{--paper:#0A0A0A;--paper-2:#141414;--ink:#F5F5F4;--ink-3:#9CA3AF;--ink-4:#6B7280;--rule:#2A2A2A;--rule-2:#3A3A3A;--signal:#8CC63F;--danger:#E07A41;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{background:var(--paper);color:var(--ink);font-family:'Schibsted Grotesk',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:repeating-linear-gradient(0deg,rgba(140,198,63,.012) 0 1px,transparent 1px 3px);}
 .card{width:min(440px,92vw);border:1px solid var(--rule-2);background:var(--paper-2);padding:34px 32px;}
 .wm{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--ink);margin-bottom:22px;}
 .wm .s{color:var(--signal);}
 .eyebrow{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--signal);margin-bottom:12px;}
 h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:28px;line-height:1.1;margin-bottom:10px;}
 p{color:var(--ink-3);font-size:13.5px;line-height:1.55;margin-bottom:20px;}
 input{width:100%;background:var(--paper);border:1px solid var(--rule-2);color:var(--ink);font-family:'Space Mono',monospace;font-size:14px;padding:12px 14px;letter-spacing:.04em;}
 input:focus{outline:none;border-color:var(--signal);}
 button{width:100%;margin-top:12px;background:var(--signal);color:#0A0A0A;border:none;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:13px;cursor:pointer;}
 button:hover{background:#7AB332;}
 .err{display:none;color:var(--danger);font-family:'Space Mono',monospace;font-size:11.5px;margin-top:12px;letter-spacing:.03em;}
 .foot{margin-top:22px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4);}

async function unlock(){

 try{
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
